<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZDOS IDE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin:0;
    background:#0a0a0c;
    color:#e5e7eb;
    font-family:system-ui, sans-serif;
    display:flex;
    height:100vh;
    overflow:hidden;
  }

  #sidebar {
    width:230px;
    background:#0f1117;
    border-right:1px solid #1f2937;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  #logo {
    font-size:15px;
    font-weight:700;
    color:#2bffb3;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }

  .section-title {
    font-size:11px;
    color:#7df9ff;
    margin-bottom:6px;
  }

  .nav-item {
    font-size:13px;
    padding:5px 0;
    cursor:pointer;
    color:#9ca3af;
  }
  .nav-item:hover {
    color:#2bffb3;
  }

  #main {
    flex:1;
    display:flex;
    flex-direction:column;
  }

  #editor {
    flex:1;
    background:#0b0d14;
    border-bottom:1px solid #1f2937;
    padding:20px;
    font-family:monospace;
    font-size:14px;
    color:#e5e7eb;
    outline:none;
    overflow:auto;
  }

  #terminal {
    height:180px;
    background:#000;
    color:#2bffb3;
    padding:12px;
    font-family:monospace;
    font-size:13px;
    overflow:auto;
    border-top:1px solid #1f2937;
  }
</style>
</head>

<body>

<div id="sidebar">
  <div id="logo">ZDOS IDE</div>

  <div>
    <div class="section-title">GENESIS</div>
    <div class="nav-item">Bootflow</div>
    <div class="nav-item">Modules</div>
    <div class="nav-item">Kernel Map</div>
  </div>

  <div>
    <div class="section-title">TOOLS</div>
    <div class="nav-item">Z‑LANG</div>
    <div class="nav-item">Z‑VM</div>
    <div class="nav-item">FS Viewer</div>
  </div>

  <div>
    <div class="section-title">SYSTEM</div>
    <div class="nav-item">Settings</div>
    <div class="nav-item">About</div>
  </div>
</div>

<div id="main">
  <div id="editor" contenteditable="true">
// ZDOS IDE — Template originale.
// Scrivi codice Z‑LANG qui.
  </div>

  <div id="terminal">
[ZDOS] Terminale pronto.
  </div>
</div>

</body>
</html>
