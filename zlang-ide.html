<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Z‑LANG IDE PRO</title>
<style>
  body { background:#000; color:#0f0; font-family:monospace; margin:0; padding:0; }
  #container { display:flex; height:100vh; }
  #editor { width:50%; padding:10px; background:#111; color:#0f0; font-size:14px; outline:none; border:none; }
  #right { width:50%; display:flex; flex-direction:column; }
  #output { flex:1; background:#000; padding:10px; overflow:auto; border-left:2px solid #0f0; }
  #buttons { padding:10px; background:#111; border-left:2px solid #0f0; }
  button { background:#000; color:#0f0; border:1px solid #0f0; padding:5px 10px; margin-right:5px; cursor:pointer; }
  button:hover { background:#0f0; color:#000; }
  #term-input { width:100%; background:#000; color:#0f0; border:1px solid #0f0; padding:5px; font-family:monospace; }
  .op { color:#0ff; }
</style>
</head>

<body>
<div id="container">
  <textarea id="editor"># Esempio Z-LANG
push 5
push 7
add
halt</textarea>

  <div id="right">
    <div id="buttons">
      <button onclick="runProgram()">Run VM</button>
      <button onclick="stepProgram()">Step</button>
      <button onclick="runZLang()">Run Z‑LANG</button>
      <button onclick="runZVM()">Run Z‑VM</button>
      <button onclick="compileAndRunZVM()">Compile & Run Z‑VM</button>
    </div>

    <div id="output"></div>

    <input id="term-input" placeholder="ZDOS> comando" onkeydown="if(event.key==='Enter') handleTermCommand(this.value)">
  </div>
</div>

<script>
const editorEl = document.getElementById("editor");
const outEl = document.getElementById("output");

function log(msg) {
  outEl.innerHTML += msg + "<br>";
  outEl.scrollTop = outEl.scrollHeight;
}

function highlight(code) {
  code = code.replace(/\brun\.zlang\b/g, '<span class="op">run.zlang</span>');
  return code;
}

/* ============================================================
   MINI‑VM ORIGINALE (per compatibilità)
   ============================================================ */
const VM = {
  pc: 0,
  program: [],
  vars: {},
  fs: {},
  lastResult: null
};

function parseProgram() {
  VM.program = [];
  const lines = editorEl.value.split("\n");
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    const parts = line.split(" ");
    VM.program.push({ op: parts[0], raw: line });
  }
}

function stepProgram() {
  if (VM.pc >= VM.program.length) {
    log("[VM] Fine programma.");
    return;
  }

  const instr = VM.program[VM.pc++];
  switch(instr.op) {

    case "run.zlang": {
      const code = instr.raw.replace("run.zlang ", "");
      log("[run.zlang] >>> " + code);
      VM.lastResult = "OK";
      break;
    }

    default:
      log("[VM] Istruzione sconosciuta: " + instr.op);
  }
}

function runProgram() {
  outEl.innerHTML = "";
  VM.pc = 0;
  parseProgram();
  while (VM.pc < VM.program.length) stepProgram();
}

/* ============================================================
   Z‑VM STACK MACHINE
   ============================================================ */
const ZVM = {
  pc: 0,
  stack: [],
  heap: {},
  regs: { r0:0, r1:0, r2:0, r3:0 },
  bytecode: [],
  halted: false
};

function zvmStep() {
  if (ZVM.halted || ZVM.pc >= ZVM.bytecode.length) return;

  const op = ZVM.bytecode[ZVM.pc++];

  switch(op) {
    case 0x01: ZVM.stack.push(ZVM.bytecode[ZVM.pc++]); break;
    case 0x02: ZVM.stack.pop(); break;
    case 0x03: { const b=ZVM.stack.pop(), a=ZVM.stack.pop(); ZVM.stack.push(a+b); break; }
    case 0x04: { const b=ZVM.stack.pop(), a=ZVM.stack.pop(); ZVM.stack.push(a-b); break; }
    case 0x05: { const b=ZVM.stack.pop(), a=ZVM.stack.pop(); ZVM.stack.push(a*b); break; }
    case 0x06: { const b=ZVM.stack.pop(), a=ZVM.stack.pop(); ZVM.stack.push(a/b); break; }
    case 0x07: { const r="r"+ZVM.bytecode[ZVM.pc++]; ZVM.stack.push(ZVM.regs[r]); break; }
    case 0x08: { const r="r"+ZVM.bytecode[ZVM.pc++]; ZVM.regs[r]=ZVM.stack.pop(); break; }
    case 0x09: ZVM.halted = true; break;
  }
}

function runZVM() {
  outEl.innerHTML = "";
  log("[ZVM] Avvio stack machine…");

  ZVM.pc = 0;
  ZVM.stack = [];
  ZVM.regs = { r0:0, r1:0, r2:0, r3:0 };
  ZVM.halted = false;

  while (!ZVM.halted && ZVM.pc < ZVM.bytecode.length) {
    zvmStep();
  }

  log("[ZVM] Completato. Stack: " + JSON.stringify(ZVM.stack));
}

/* ============================================================
   COMPILATORE Z‑LANG → Z‑VM
   ============================================================ */
function compileZLangToZVM(code) {
  const lines = code.split("\n");
  const bc = [];

  for (let line of lines) {
    line = line.trim();
    if (!line || line.startsWith("#")) continue;

    if (line.startsWith("push ")) {
      bc.push(0x01, Number(line.split(" ")[1]));
    } else if (line === "add") bc.push(0x03);
    else if (line === "sub") bc.push(0x04);
    else if (line === "mul") bc.push(0x05);
    else if (line === "div") bc.push(0x06);
    else if (line === "halt") bc.push(0x09);
  }

  return bc;
}

function compileAndRunZVM() {
  outEl.innerHTML = "";
  log("[ZVM] Compilazione…");
  ZVM.bytecode = compileZLangToZVM(editorEl.value);
  log("[ZVM] Bytecode: " + JSON.stringify(ZVM.bytecode));
  runZVM();
}

/* ============================================================
   TERMINALE ZDOS
   ============================================================ */
function handleTermCommand(cmd) {
  cmd = cmd.trim();
  if (!cmd) return;
  log("ZDOS> " + cmd);

  if (cmd === "run zvm") runZVM();
  else if (cmd === "compile zvm") compileAndRunZVM();
  else if (cmd === "vars") log("[vars] " + JSON.stringify(VM.vars));
  else if (cmd === "fs") log("[fs] " + JSON.stringify(VM.fs));
  else log("[errore] Comando sconosciuto.");
}
</script>
</body>
</html>
